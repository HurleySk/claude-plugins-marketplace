name: Sync Plugin Version

on:
  repository_dispatch:
    types: [plugin-version-update]

permissions:
  contents: write

jobs:
  update-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update marketplace.json
        run: |
          PLUGIN_NAME="${{ github.event.client_payload.plugin_name }}"
          NEW_VERSION="${{ github.event.client_payload.version }}"
          echo "Updating $PLUGIN_NAME to v$NEW_VERSION"

          jq --arg name "$PLUGIN_NAME" --arg ver "$NEW_VERSION" \
            '(.plugins[] | select(.name == $name)).version = $ver' \
            .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Sync ${{ github.event.client_payload.plugin_name }} to v${{ github.event.client_payload.version }}"
          git push
